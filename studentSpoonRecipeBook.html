<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Spoon Recipe Book</title>
    <link rel="icon" type="image/x-icon" href="Images\StudentSpoonBrandLogo.png">
    <link rel="stylesheet" href="studentSpoon.css">
</head>

<body>
    <header>
        <div class="logo-area">
            <a href="studentSpoonHomePage.html">
                <img src = "Images\StudentSpoonBrandLogo.png" alt="Student Spoon Logo">
            </a>
        </div>

        <div class = "search-icon">
            <img src = "Images\SearchIcon.png" alt="Search Icon">
        </div>
    </header>

<main>
    <div class="recipe-page">
        <div class="recipe-image-side">
            <img id="recipeImage" src="" alt="">
        </div>

        <div class="recipe-info-side">
            <h1 id="recipeTitle">RECIPE TITLE</h1>

            <div class="recipe-stats">
                <div>
                    <p>Recipe Ratings</p>
                    <p id="recipeRating">4/5</p>
                </div>

                <div>
                    <p>Estimated Costs</p>
                    <p id="recipeCost">$5</p>
                </div>
            </div>

            <p id="recipeDescription"></p>

            <h2>Ingredients:</h2>
            <ul id="recipeIngredients"></ul>

            <h2>Let's cook</h2>
            <ol id="recipeMethod"></ol>
        </div>
    </div>
</main>

    <footer>
        <div class="logo-area">
            <a href="studentSpoonHomePage.html">
                <img src="Images\StudentSpoonBrandLogo.png" alt="Student Spoon Logo">
            </a>
        </div>

        <nav class="footer-nav">
            <a href="studentSpoonHomePage.html">Home Page</a>
            <a href="studentSpoonContentUpload.html">Create Post</a>
            <a href="studentSpoonAboutUs.html">About Us</a>
            <a href="studentSpoonContentUpload.html">Share a Recipe</a>
        </nav>
    </footer>

    <script src="studentSpoon.js"></script>

</body>
